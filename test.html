<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>AniList Widget</title>
<style>
body {
  background:#0b0f14;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  margin:0;
  font-family:Arial, sans-serif;
}
#widget {
  background:#111827;
  color:#e5e7eb;
  padding:20px;
  border-radius:14px;
  width:320px;
  box-shadow:0 10px 30px rgba(0,0,0,0.4);
}
h2 {
  margin:0 0 10px 0;
  font-size:18px;
}
.stat {
  margin:6px 0;
  font-size:14px;
}
.highlight {
  color:#60a5fa;
  font-weight:bold;
}
.bar {
  height:8px;
  background:#1f2937;
  border-radius:6px;
  overflow:hidden;
  margin:10px 0;
}
.bar-inner {
  height:100%;
  background:#60a5fa;
  width:0%;
  transition:width 0.8s ease;
}
.list {
  margin-top:12px;
}
.item {
  font-size:13px;
  padding:4px 0;
  border-bottom:1px solid rgba(255,255,255,0.05);
}
small {
  color:#9ca3af;
}
</style>
</head>
<body>

<div id="widget">
  <h2>Anime Stats</h2>
  <div id="content">Loading...</div>
</div>

<script>
const USERNAME = "Zenrac";

const query = `
query ($name: String) {
  User(name: $name) {
    statistics {
      anime {
        count
        episodesWatched
        minutesWatched
        meanScore
      }
    }
  }
  MediaListCollection(userName: $name, type: ANIME, sort: UPDATED_TIME_DESC) {
    lists {
      entries {
        media {
          title { romaji }
        }
        progress
      }
    }
  }
}
`;

async function load() {
  const res = await fetch("https://graphql.anilist.co", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "Accept": "application/json"
    },
    body: JSON.stringify({
      query,
      variables: { name: USERNAME }
    })
  });

  const json = await res.json();
  const stats = json.data.User.statistics.anime;

  const hours = Math.round(stats.minutesWatched / 60);
  const days = (hours / 24).toFixed(1);

  let recent = [];
  json.data.MediaListCollection.lists.forEach(l => {
    l.entries.forEach(e => recent.push(e));
  });
  recent = recent.slice(0, 5);

  const progress = Math.min((stats.anime / 10000) * 100, 100);

  document.getElementById("content").innerHTML = `
    <div class="stat">Anime : <span class="highlight">${stats.count}</span></div>
    <div class="stat">Episodes : <span class="highlight">${stats.episodesWatched}</span></div>
    <div class="stat">Time : <span class="highlight">${hours}h</span> <small>(~${days} days)</small></div>
    <div class="stat">Average Score : <span class="highlight">${stats.meanScore}</span></div>

    <div class="bar"><div class="bar-inner" style="width:${progress}%"></div></div>
    <small>Progression towards 10000 completed animes</small>

    <div class="list">
      <h2 style="font-size:15px;margin-top:12px;">Recent</h2>
      ${recent.map(e => `
        <div class="item">
          ${e.media.title.romaji} <small>(ep ${e.progress})</small>
        </div>
      `).join("")}
    </div>
  `;
}

load();
</script>

</body>
</html>
